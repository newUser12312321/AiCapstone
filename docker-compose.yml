# GEMINI 실크 게이트 사용 시 프로젝트 루트에 .env 를 두고 GEMINI_API_KEY=... 설정하거나,
# 실행 시 GEMINI_API_KEY=... docker compose up
services:
  mysql:
    image: mysql:8.4
    container_name: aicapstone-mysql
    environment:
      MYSQL_ROOT_PASSWORD: your_password
      MYSQL_DATABASE: inspection_db
      TZ: Asia/Seoul
    # 호스트에 MySQL이 이미 3306을 쓰는 경우가 많아 3307로 노출 (컨테이너 내부는 3306)
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pyour_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: aicapstone-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/inspection_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: your_password
      # application-docker.yml 의 ${DB_PASSWORD} 와 동일하게 맞춤
      DB_PASSWORD: your_password
      TZ: Asia/Seoul
    ports:
      - "8080:8080"

  edge:
    build:
      context: ./edge
    container_name: aicapstone-edge
    depends_on:
      - backend
    environment:
      SERVER_BASE_URL: http://backend:8080
      SERVER_INSPECTION_API_PATH: /api/v1/inspections
      ENVIRONMENT: production
      CAMERA_DEVICE_INDEX: 0
      TZ: Asia/Seoul
      # PCB 다클래스: deskew 후 전체 프레임 추론
      DEFECT_INFER_ON_FULL_DESKEW: "true"
      FAIL_ON_ANY_YOLO_DETECTION: "false"
      STAGE2_SOURCE_MODE: aligned
      # 학습 imgsz 에 맞게 조정 (640 학습 모델이면 "640")
      YOLO_PREDICT_IMGSZ: "1024"
      YOLO_DEFECT_CONFIDENCE_THRESHOLD: "0.15"
      # Gemini 실크 게이트 (+ 실크 OCR → 검사패킷 silk* 필드)
      GEMINI_GATE_ENABLED: "true"
      GEMINI_MODEL: gemini-2.5-flash
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      BOARD_SILK_GATE_CONFIG_PATH: config/vision_board_gate.json
      BOARD_SILK_GATE_REQUIRE_MULTIBOARD: "false"
      BOARD_OCR_ROUTING_ENABLED: "true"
      BOARD_IDENTIFIER_YOLO_ENABLED: "false"
      MULTI_BOARD_ENABLED: "false"
      EDGE_RETRY_QUEUE_DB_PATH: data/inspection_retry_queue.db
    ports:
      - "8000:8000"
    volumes:
      - ./edge/captures:/app/captures
      - ./edge/demo_samples:/app/demo_samples
      - ./edge/data:/app/data
      # Colab 등에서 받은 가중치를 edge/weights/ 에 두면 컨테이너에 반영
      - ./edge/weights:/app/weights

  frontend:
    build:
      context: ./frontend
    container_name: aicapstone-frontend
    depends_on:
      - backend
      - edge
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
      VITE_EDGE_CAPTURE_URL: http://edge:8000
    ports:
      - "5173:5173"

volumes:
  mysql_data:
