# PC/서버 스택: MySQL + Spring Boot + 프론트(대시보드)만 컨테이너로 기동.
# 엣지 검사 API·캡처는 Pi 등 별도 호스트 :8000 에서 띄운 뒤, 아래 주소를 맞춘다.
#
#   프로젝트 루트에 .env 를 두고 예: VITE_EDGE_CAPTURE_URL=http://192.168.0.13:8000
#   (미설정 시 기본 host.docker.internal:8000 — Linux 는 extra_hosts 로 host-gateway 매핑)
#
# 실행: docker compose -f docker-compose.pc.yml up --build

services:
  mysql:
    image: mysql:8.4
    container_name: aicapstone-mysql
    environment:
      MYSQL_ROOT_PASSWORD: your_password
      MYSQL_DATABASE: inspection_db
      TZ: Asia/Seoul
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pyour_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: aicapstone-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/inspection_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: your_password
      DB_PASSWORD: your_password
      TZ: Asia/Seoul
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_PROXY_TARGET: http://backend:8080
        VITE_EDGE_CAPTURE_URL: ${VITE_EDGE_CAPTURE_URL:-http://host.docker.internal:8000}
    container_name: aicapstone-frontend
    depends_on:
      - backend
    # Linux 서버: host.docker.internal → 호스트 루프백 (Docker 20.10+ host-gateway)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./frontend/.env
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
      VITE_EDGE_CAPTURE_URL: ${VITE_EDGE_CAPTURE_URL:-http://host.docker.internal:8000}
    ports:
      - "5173:5173"

volumes:
  mysql_data:
