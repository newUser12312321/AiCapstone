services:
  mysql:
    image: mysql:8.4
    container_name: aicapstone-mysql
    environment:
      MYSQL_ROOT_PASSWORD: your_password
      MYSQL_DATABASE: inspection_db
      TZ: Asia/Seoul
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pyour_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: aicapstone-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/inspection_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: your_password
      DB_PASSWORD: your_password
      TZ: Asia/Seoul
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_PROXY_TARGET: http://backend:8080
        # PC 전용 스택에 엣지 컨테이너가 없으면 호스트·LAN IP 로 맞춤
        VITE_EDGE_CAPTURE_URL: http://host.docker.internal:8000
    container_name: aicapstone-frontend
    depends_on:
      - backend
    env_file:
      - ./frontend/.env
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
    ports:
      - "5173:5173"

volumes:
  mysql_data:
