spring:
  application:
    name: inspection-server

  datasource:
    url: jdbc:mysql://localhost:3306/inspection_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: ${DB_PASSWORD:your_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update          # 개발 중: update / 운영: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

logging:
  level:
    com.inspection: DEBUG
    org.springframework.web: INFO

app:
  inspection-image-dir: inspection-images
  gcs-image-bucket: ${GCS_IMAGE_BUCKET:}
  # 브라우저 CORS(GCP VM 등 공인 IP로 프론트 접속 시 DELETE 프리플라이트 허용)
  # 필요 시 특정 도메인만 예: https://dash.example.com,http://localhost:*
  cors:
    allowed-origin-patterns: "*"
